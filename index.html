<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFAULT VIA MISTERIO</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 30px 20px;
            max-width: 800px;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #7f8c8d;
            margin: 0 0 20px 0;
        }
        .pdf-container {
            width: 90%;
            max-width: 1000px;
            height: 80vh; /* Высота встроенного документа */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            margin-bottom: 40px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .fallback-link {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .fallback-link:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <header>
        <h1>EVERSUMMER</h1>
        <p>Never Ever... Never Ever... Never Ever...</p>
        <a href="index.pdf" class="fallback-link" download>Скачать PDF-файл</a>
    </header>

    <div class="pdf-container">
        <iframe src="index.pdf" type="application/pdf">
            <p>Ваш браузер не поддерживает встроенные PDF. 
            <a href="index.pdf">Нажмите здесь, чтобы скачать файл.</a></p>
         iframe>
    </div>

</body>
</html>
